<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Quiz Galaxy — Reach Moksh</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- ══ START SCREEN ══ -->
<div id="s-start" class="screen active">
  <canvas id="star-cv"></canvas>
  <div class="sc">
    <div class="rocket">🚀</div>
    <h1 class="gtitle">QUIZ GALAXY</h1>
    <p class="gsub">Destroy every planet. Reach <b>MOKSH</b>.</p>
    <button class="btn" id="btn-start"><span>LAUNCH MISSION</span></button>
  </div>
</div>

<!-- ══ GAME SCREEN ══ -->
<div id="s-game" class="screen">
  <div id="hud">
    <div class="hi" id="hlives">❤️❤️❤️</div>
    <div class="hi">⭐ <span id="hscore">0</span></div>
    <div class="hi">🪐 <span id="hdone">0</span>/<span id="htotal">0</span></div>
    <div id="combo-badge">🔥 <span id="cnum">0</span>x COMBO</div>
  </div>
  <div id="arena">
    <canvas id="bg-cv"></canvas>
    <canvas id="fx-cv"></canvas>
    <div id="flash"></div>
    <div id="moksh"><span class="mt">✦ M O K S H ✦</span></div>
    <div id="planets"></div>
    <div id="bullet"></div>
    <div id="ship">🚀</div>
  </div>
</div>

<!-- ══ WIN SCREEN ══ -->
<div id="s-win" class="screen">
  <canvas id="cc"></canvas>
  <div class="wc">
    <div class="we">✨</div>
    <p class="wt">YOU REACHED</p>
    <h1 class="wm">MOKSH</h1>
    <p class="ws">Score: <b id="wscore">0</b></p>
    <p id="wcombo" style="color:#ffd700;font-size:.9rem;font-family:'Orbitron',monospace"></p>
    <button class="btn" id="btn-again"><span>PLAY AGAIN</span></button>
  </div>
</div>

<!-- ══ QUESTION MODAL ══ -->
<div id="modal-bg">
  <div id="modal">
    <p id="mq"></p>
    <div id="mopts"></div>
    <p id="mfb"></p>
  </div>
</div>

<!-- Scripts loaded in dependency order -->
<script src="js/questions.js"></script>
<script src="js/sfx.js"></script>
<script src="js/particles.js"></script>
<script src="js/background.js"></script>
<script src="js/confetti.js"></script>
<script src="js/game.js"></script>
</body>
</html>
